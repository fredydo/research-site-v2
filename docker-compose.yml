services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: node_app
    volumes:
      - people_images:/app/public/images/people
    expose:
      - "80"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_DB_USER}:${POSTGRES_DB_PASSWD}@db:5432/${POSTGRES_DB}
      NEXTAUTH_SECRET: ${JWT_KEY}
      NEXTAUTH_URL: https://${SERVER_HOST}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - web

  db:
    image: postgres:16-alpine
    container_name: postgres_db
    environment:
      POSTGRES_USER:     ${POSTGRES_DB_USER}
      POSTGRES_PASSWORD: ${POSTGRES_DB_PASSWD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_DB_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - web

  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - people_images:/app/public/images/people:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - web

networks:
  web:
    driver: bridge

volumes:
  people_images:
