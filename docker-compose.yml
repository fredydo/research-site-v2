services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: node_app
    volumes:
      - people_images:/app/public/images/people
    expose:
      - "80"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_DB_USER}:${POSTGRES_DB_PASSWD}@db:5432/${POSTGRES_DB}
      MONGO_URL: mongodb://${MONGO_DB_USER}:${MONGO_DB_PASSWD}@mongo:27017/${MONGO_DB}?authSource=admin
      NEXTAUTH_SECRET: ${JWT_KEY}
      NEXTAUTH_URL: https://${SERVER_HOST}
      EMAIL_SERVICE: ${EMAIL_SERVICE}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
      mongo:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - web

  db:
    image: postgres:16-alpine
    container_name: postgres_db
    environment:
      POSTGRES_USER:     ${POSTGRES_DB_USER}
      POSTGRES_PASSWORD: ${POSTGRES_DB_PASSWD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_DB_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - web

  mongo:
    image: mongo:7-jammy
    container_name: mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_DB_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_DB_PASSWD}
    volumes:
      - ./mongodb-data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--username", "${MONGO_DB_USER}", "--password", "${MONGO_DB_PASSWD}", "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - web

  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - people_images:/app/public/images/people:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - web

networks:
  web:
    driver: bridge

volumes:
  people_images:
